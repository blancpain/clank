type = "rule"
path = "base/rules/project-docs.md"
description = "Canonical project doc set — docs/plan.md + CHANGELOG.md + CLAUDE.md Status pointer; the contract /pickup and /handoff rely on"
tags = ["base", "process", "docs"]

[[artifacts]]
id = "plan-doc"
type = "scaffold"
path = "base/templates/plan.md"
dest = "docs/plan.md"
description = "docs/plan.md skeleton (Now / Queued / Later) — created only if missing, never overwritten, never uninstalled"
tags = ["base", "docs"]

[[artifacts]]
id = "changelog-doc"
type = "scaffold"
path = "base/templates/CHANGELOG.md"
