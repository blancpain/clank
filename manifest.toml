[presets]
minimal = ["bash-safety", "file-safety", "code-reviewer", "executing-actions-with-care"]
base-only = ["@tag:base"]
python = ["@preset:base-only", "python-reviewer", "pipeline-validator", "ruff", "python-coding-style", "python-testing", "python-security", "python-patterns"]
typescript = ["@preset:base-only", "typescript-reviewer", "frontend-reviewer", "biome", "svelte-check", "typescript-coding-style", "typescript-testing", "typescript-security", "typescript-patterns"]
sql = ["@preset:base-only", "sql-reviewer", "mcp-postgres-safety", "schema-sync-reminder", "sql-safety", "pg-mcp", "querying-db", "migration"]
supabase = ["@preset:base-only", "mcp-supabase-safety", "supabase-mcp"]
go = ["@preset:base-only", "go-reviewer", "golangci-lint", "golang-coding-style", "golang-testing", "golang-security", "golang-patterns"]
rust = ["@preset:base-only", "rust-reviewer", "cargo-clippy", "rust-coding-style", "rust-testing", "rust-security"]
swift = ["@preset:base-only", "swift-reviewer", "swift-coding-style", "swiftui-patterns", "swift-testing", "release-discipline", "ios-run", "appstore-connect", "ios-app-store-setup"]
python-sql = ["@preset:python", "@preset:sql"]
typescript-sql = ["@preset:typescript", "@preset:sql"]
fullstack-python = ["@preset:python", "@preset:typescript", "@preset:sql"]
all = ["@tag:*"]
