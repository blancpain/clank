version = 1

[[artifacts]]
id = "stub-agent"
type = "agent"
path = "base/agents/stub-agent.md"
description = "Stub agent for installer tests"
tags = ["base", "test"]

[[artifacts]]
id = "stub-hook"
type = "hook"
path = "base/hooks/stub-hook.sh"
settings_fragment = "base/settings.fragments/stub-hook.json"
description = "Stub hook"
tags = ["base", "test"]

[[artifacts]]
id = "stub-mcp"
type = "mcp"
path = "addons/sql/mcp/stub-mcp-wrapper.sh"
mcp_fragment = "addons/sql/mcp/mcp-stub.json"
description = "Stub MCP server for installer tests"
tags = ["sql", "test"]

[presets]
minimal = ["stub-agent"]
all = ["@tag:*"]
test-both = ["stub-agent", "stub-hook"]
test-mcp = ["stub-agent", "stub-mcp"]
